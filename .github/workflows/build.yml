name: Build SEPTest

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show tool versions
        run: |
          xcodebuild -version
          clang --version

      - name: Build for iPhone
        run: |
          xcodebuild \
            -project SEPTest/SEPTest.xcodeproj \
            -scheme SEPTest \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            build

      - name: List build products
        run: |
          find build/Build/Products -maxdepth 2

      - name: Upload app
        uses: actions/upload-artifact@v4
        with:
          name: SEPTest-iPhone
          path: build/Build/Products/Release-iphoneos/SEPTest.app