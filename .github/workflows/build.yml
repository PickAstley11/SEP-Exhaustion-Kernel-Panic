name: Build SEPTest

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build
        run: |
          xcodebuild \
            -project SEPTest/SEPTest.xcodeproj \
            -scheme SEPTest \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            build

      - name: Verify output
        run: |
          ls -R build/Build/Products/Release-iphoneos

      - name: Package .app
        run: |
          cd build/Build/Products/Release-iphoneos
          ditto -c -k --sequesterRsrc --keepParent SEPTest.app SEPTest.app.zip

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: SEPTest-device
          path: build/Build/Products/Release-iphoneos/SEPTest.app.zip