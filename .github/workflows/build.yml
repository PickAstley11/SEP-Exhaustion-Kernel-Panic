name: Build SEPTest

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show tool versions
        run: |
          xcodebuild -version
          clang --version

      - name: Build
        run: |
          xcodebuild \
            -project SEPTest/SEPTest.xcodeproj \
            -scheme SEPTest \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SEPTest.app
          path: build/Build/Products/Release-iphonesimulator/SEPTest.app